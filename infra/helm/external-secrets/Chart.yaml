name: external-secrets
description: >
  Wrapper chart for External Secrets Operator (ESO).
  Syncs secrets from external providers (AWS SSM/Secrets Manager, Vault, GCP SM)
  into Kubernetes Secrets consumed by audiomind services.
type: application
version: 0.1.0
appVersion: "0.14.4"

dependencies:
  - name: external-secrets
    version: "0.14.4"
    repository: "https://charts.external-secrets.io"
