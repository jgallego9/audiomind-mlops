apiVersion: v2
name: inferflow-ingress
description: >
  Umbrella chart for Inferflow ingress infrastructure:
  ingress-nginx (ingress controller) and cert-manager (TLS certificate management).
type: application
version: 0.1.0

dependencies:
  - name: ingress-nginx
    version: "4.11.4"
    repository: "https://kubernetes.github.io/ingress-nginx"
    condition: ingressNginx.enabled

  - name: cert-manager
    version: "v1.17.2"
    repository: "https://charts.jetstack.io"
    condition: certManager.enabled
