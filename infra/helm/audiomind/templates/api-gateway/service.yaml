apiVersion: v1
kind: Service
metadata:
  name: {{ include "audiomind.apiGateway.fullname" . }}
  labels:
    {{- include "audiomind.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
spec:
  type: {{ .Values.apiGateway.service.type }}
  ports:
    - port: {{ .Values.apiGateway.service.port }}
      targetPort: {{ .Values.apiGateway.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "audiomind.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
