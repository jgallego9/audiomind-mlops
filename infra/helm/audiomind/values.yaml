# ---------------------------------------------------------------------------
# AudioMind Helm chart — base values
# Override with values-dev.yaml or values-prod.yaml
# ---------------------------------------------------------------------------

nameOverride: ""
fullnameOverride: ""
# ---------------------------------------------------------------------------
# Image registry used by CI/CD (F3-3 pushes here)
# ---------------------------------------------------------------------------
imageRegistry: ghcr.io/jgallego9
# ---------------------------------------------------------------------------
# api-gateway
# ---------------------------------------------------------------------------
apiGateway:
  image:
    repository: ghcr.io/jgallego9/inferflow-api-gateway
    tag: sha-b5772f3
    pullPolicy: IfNotPresent
  replicaCount: 2
  service:
    type: ClusterIP
    port: 80
    targetPort: 8000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Horizontal Pod Autoscaler (requires metrics-server; see hpa.yaml)
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  # List (not map) to guarantee stable env-var order across renders → avoids
  # unnecessary pod restarts caused by non-deterministic Go map iteration.
  env:
    - name: JWT_ALGORITHM
      value: HS256
    - name: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
      value: "30"
    - name: RATE_LIMIT_DEFAULT
      value: 100/minute
    - name: RATE_LIMIT_AUTH
      value: 10/minute
    - name: QDRANT_COLLECTION
      value: transcriptions
    - name: EMBEDDING_MODEL
      value: BAAI/bge-small-en-v1.5
    - name: OTEL_ENABLED
      value: "false"
    - name: OTEL_OTLP_ENDPOINT
      value: http://jaeger-collector:4318
  # Reference to a pre-existing K8s Secret that contains JWT_SECRET_KEY.
  # Create it once with:
  #   kubectl create secret generic inferflow-secrets \
  #     --from-literal=JWT_SECRET_KEY=<your-32-char-secret>
  existingSecret: inferflow-secrets
  secretKey: JWT_SECRET_KEY
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /ready
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3
  # PodDisruptionBudget: keep at least 1 pod available during voluntary disruptions.
  pdb:
    enabled: true
    minAvailable: 1
  # Ingress (requires ingress-nginx + cert-manager, F2-8)
  ingress:
    enabled: false
    host: inferflow.local
    tls: false
    clusterIssuer: inferflow-ca-issuer
    annotations: {}
# ---------------------------------------------------------------------------
# worker
# ---------------------------------------------------------------------------
worker:
  image:
    repository: ghcr.io/jgallego9/inferflow-worker
    tag: sha-b5772f3
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env:
    - name: QDRANT_COLLECTION
      value: transcriptions
    - name: EMBEDDING_MODEL
      value: BAAI/bge-small-en-v1.5
    - name: LOG_LEVEL
      value: INFO
  # PodDisruptionBudget for worker.
  pdb:
    enabled: true
    minAvailable: 1
# ---------------------------------------------------------------------------
# Redis (Bitnami subchart)
# https://github.com/bitnami/charts/tree/main/bitnami/redis
# ---------------------------------------------------------------------------
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false
# ---------------------------------------------------------------------------
# Qdrant (subchart)
# https://github.com/qdrant/qdrant-helm
# ---------------------------------------------------------------------------
qdrant:
  enabled: true
  replicaCount: 1
# ---------------------------------------------------------------------------
# ServiceAccount
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: "" # leave empty to derive from fullname
# ---------------------------------------------------------------------------
# vLLM inference server (F2-4)
# Disabled by default; enable via values-gpu.yaml overlay or set vllm.enabled=true
# ---------------------------------------------------------------------------
vllm:
  enabled: false
  image:
    repository: vllm/vllm-openai
    tag: "v0.6.6"
    pullPolicy: IfNotPresent
  replicaCount: 1
  # Model to load at startup.  Set to a public HF model or a locally mounted path.
  model: "mistralai/Mistral-7B-Instruct-v0.3"
  # HuggingFace token for gated models — read from the same pre-existing Secret
  # used by api-gateway (kubectl create secret generic audiomind-secrets ...).
  hfTokenSecret:
    name: inferflow-secrets
    key: HF_TOKEN
  resources:
    requests:
      cpu: "2000m"
      memory: 8Gi
      nvidia.com/gpu: "1"
    limits:
      cpu: "4000m"
      memory: 16Gi
      nvidia.com/gpu: "1"
  # Place vLLM pods on GPU-capable nodes.
  # GPU Operator + NFD (F2-3) label nodes with nvidia.com/gpu.present=true.
  nodeSelector:
    nvidia.com/gpu.present: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  service:
    type: ClusterIP
    port: 8000
  env:
    - name: VLLM_WORKER_MULTIPROC_METHOD
      value: spawn
    - name: VLLM_TENSOR_PARALLEL_SIZE
      value: "1"
    - name: HF_HOME
      value: /data/huggingface
  # PVC to cache HuggingFace model weights — avoids re-download on pod restart.
  persistence:
    enabled: true
    size: 30Gi
    storageClass: "" # "" → cluster default StorageClass
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 120 # allow time for model loading
    periodSeconds: 30
    failureThreshold: 5
  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 10
# ---------------------------------------------------------------------------
# Shared PVC for model-weight caching (used by steps with modelVolume set).
# ---------------------------------------------------------------------------
modelsCache:
  size: 10Gi
  storageClass: "" # "" → cluster default StorageClass
# ---------------------------------------------------------------------------
# Inferflow pipelines
#
# Each top-level key is a pipeline name (must match pipelines/<name>/pipeline.yaml).
# Steps are keyed by their step ID.
#
# Step fields:
#   image            (required) — fully-qualified container image
#   replicas         default 1
#   port             default 8080 — container port (KServe V2)
#   imagePullPolicy  default IfNotPresent
#   gpu              — number of nvidia.com/gpu to request (optional)
#   modelVolume      — if set, mounts shared PVC models-cache at this path
#   env              — map of extra env vars (merged on top of pipeline-level env)
#   resources        — full Kubernetes ResourceRequirements block (overrides default)
#   hpa.enabled      — enable HPA for this step
#   hpa.minReplicas  default 1
#   hpa.maxReplicas  default 5
#   hpa.targetCPUUtilizationPercentage  default 70
#   nodeSelector     — node selector map (e.g. for GPU nodes)
#   tolerations      — list of tolerations
#
# Pipeline fields:
#   enabled  — set to false to skip all resources for this pipeline
#   env      — map of env vars injected into every step in the pipeline
# ---------------------------------------------------------------------------
pipelines:
  audio-rag:
    enabled: true
    env:
      QDRANT_COLLECTION: "transcriptions"
      EMBEDDING_MODEL: "BAAI/bge-small-en-v1.5"
    steps:
      transcribe:
        image: "ghcr.io/jgallego9/step-stt-whisper:1.0.0"
        replicas: 1
        modelVolume: "/models"
        livenessInitialDelaySeconds: 60
        readinessInitialDelaySeconds: 30
        resources:
          requests:
            cpu: "500m"
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 4Gi
      embed:
        image: "ghcr.io/jgallego9/step-embed-fastembed:1.0.0"
        replicas: 2
        modelVolume: "/models"
        resources:
          requests:
            cpu: "200m"
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
        hpa:
          enabled: false
          minReplicas: 2
          maxReplicas: 6
          targetCPUUtilizationPercentage: 70
      index:
        image: "ghcr.io/jgallego9/step-vector-index-qdrant:1.0.0"
        replicas: 1
        resources:
          requests:
            cpu: "100m"
            memory: 256Mi
          limits:
            cpu: "500m"
            memory: 512Mi
      search:
        image: "ghcr.io/jgallego9/step-vector-search-qdrant:1.0.0"
        replicas: 1
        resources:
          requests:
            cpu: "100m"
            memory: 256Mi
          limits:
            cpu: "500m"
            memory: 512Mi
  image-search:
    enabled: true
    env:
      QDRANT_COLLECTION: "images"
      EMBEDDING_MODEL: "Qdrant/resnet50-onnx"
    steps:
      embed:
        image: "ghcr.io/jgallego9/step-vision-clip:1.0.0"
        replicas: 1
        modelVolume: "/models"
        resources:
          requests:
            cpu: "200m"
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
      search:
        image: "ghcr.io/jgallego9/step-vector-search-qdrant:1.0.0"
        replicas: 1
        resources:
          requests:
            cpu: "100m"
            memory: 256Mi
          limits:
            cpu: "500m"
            memory: 512Mi
