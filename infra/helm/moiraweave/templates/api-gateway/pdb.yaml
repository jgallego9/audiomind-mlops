{{- if .Values.apiGateway.pdb.enabled }}
# PodDisruptionBudget for api-gateway.
# Guarantees that at least 1 pod stays available during voluntary disruptions
# (node drain, rolling upgrades). Requires replicaCount >= 2.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "moiraweave.apiGateway.fullname" . }}-pdb
  labels:
    {{- include "moiraweave.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
spec:
  minAvailable: {{ .Values.apiGateway.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "moiraweave.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api-gateway
{{- end }}
