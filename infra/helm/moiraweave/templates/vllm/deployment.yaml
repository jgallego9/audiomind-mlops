{{- if .Values.vllm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "moiraweave.fullname" . }}-vllm
  labels:
    {{- include "moiraweave.labels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
spec:
  replicas: {{ .Values.vllm.replicaCount }}
  selector:
    matchLabels:
      {{- include "moiraweave.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: vllm
  template:
    metadata:
      labels:
        {{- include "moiraweave.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: vllm
    spec:
      serviceAccountName: {{ include "moiraweave.serviceAccountName" . }}
      {{- with .Values.vllm.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vllm.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: vllm
          image: "{{ .Values.vllm.image.repository }}:{{ .Values.vllm.image.tag }}"
          imagePullPolicy: {{ .Values.vllm.image.pullPolicy }}
          command:
            - python
            - -m
            - vllm.entrypoints.openai.api_server
            - --model
            - {{ .Values.vllm.model | quote }}
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- toYaml .Values.vllm.env | nindent 12 }}
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vllm.hfTokenSecret.name }}
                  key: {{ .Values.vllm.hfTokenSecret.key }}
                  optional: true   # allow running without gated models
          {{- if .Values.vllm.persistence.enabled }}
          volumeMounts:
            - name: model-cache
              mountPath: /data/huggingface
          {{- end }}
          resources:
            {{- toYaml .Values.vllm.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.vllm.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.vllm.readinessProbe | nindent 12 }}
      {{- if .Values.vllm.persistence.enabled }}
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: {{ include "moiraweave.fullname" . }}-vllm-cache
      {{- end }}
{{- end }}
