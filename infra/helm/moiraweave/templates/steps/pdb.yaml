{{- /*
PodDisruptionBudget per pipeline step.
Skipped for steps with replicas < 2 (PDB with minAvailable=1 is pointless
on single-replica deployments and would block cluster drain operations).
*/ -}}
{{- range $pipelineName, $pipeline := .Values.pipelines }}
{{- if $pipeline.enabled }}
{{- range $stepId, $step := $pipeline.steps }}
{{- if $step.image }}
{{- $replicas := default 1 $step.replicas | int }}
{{- if gt $replicas 1 }}
{{- $ctx := dict "root" $ "pipelineName" $pipelineName "stepId" $stepId }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ printf "%s-pdb" (include "moiraweave.step.fullname" $ctx) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "moiraweave.labels" $ | nindent 4 }}
    app.kubernetes.io/component: step
    moiraweave.io/pipeline: {{ $pipelineName }}
    moiraweave.io/step: {{ $stepId }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "moiraweave.step.selectorLabels" $ctx | nindent 6 }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
