{{- /*
HorizontalPodAutoscaler per pipeline step.
Only rendered when step.hpa.enabled is true.
*/ -}}
{{- range $pipelineName, $pipeline := .Values.pipelines }}
{{- if $pipeline.enabled }}
{{- range $stepId, $step := $pipeline.steps }}
{{- if and $step.image $step.hpa $step.hpa.enabled }}
{{- $ctx := dict "root" $ "pipelineName" $pipelineName "stepId" $stepId }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ printf "%s-hpa" (include "moiraweave.step.fullname" $ctx) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "moiraweave.labels" $ | nindent 4 }}
    app.kubernetes.io/component: step
    moiraweave.io/pipeline: {{ $pipelineName }}
    moiraweave.io/step: {{ $stepId }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "moiraweave.step.fullname" $ctx }}
  minReplicas: {{ default 1 $step.hpa.minReplicas }}
  maxReplicas: {{ default 5 $step.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ default 70 $step.hpa.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
