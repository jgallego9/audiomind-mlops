{{- /*
Shared PVC for model weights (models-cache).
Only rendered when at least one enabled step has `modelVolume` set.
*/ -}}
{{- $needsPVC := false }}
{{- range $pipelineName, $pipeline := .Values.pipelines }}
{{- if $pipeline.enabled }}
{{- range $stepId, $step := $pipeline.steps }}
{{- if and $step.image $step.modelVolume }}
{{- $needsPVC = true }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- if $needsPVC }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ printf "%s-models-cache" (include "moiraweave.fullname" .) }}
  labels:
    {{- include "moiraweave.labels" . | nindent 4 }}
    app.kubernetes.io/component: models-cache
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ default "10Gi" .Values.modelsCache.size }}
  {{- if .Values.modelsCache.storageClass }}
  storageClassName: {{ .Values.modelsCache.storageClass }}
  {{- end }}
{{- end }}
