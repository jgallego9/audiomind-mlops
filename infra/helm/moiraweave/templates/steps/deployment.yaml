{{- /*
Deployment per pipeline step.

Iterates over .Values.pipelines.<pipelineName>.steps and renders one
Deployment per step that has an `image` set.

Each step inherits:
  - pipeline-level env  (.Values.pipelines.<name>.env)
  - step-level env      (.Values.pipelines.<name>.steps.<id>.env)   (takes priority)
  - runtime service URLs injected automatically (REDIS_URL, QDRANT_URL)
*/ -}}
{{- range $pipelineName, $pipeline := .Values.pipelines }}
{{- if $pipeline.enabled }}
{{- range $stepId, $step := $pipeline.steps }}
{{- if $step.image }}
{{- $ctx := dict "root" $ "pipelineName" $pipelineName "stepId" $stepId }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "moiraweave.step.fullname" $ctx }}
  labels:
    {{- include "moiraweave.labels" $ | nindent 4 }}
    app.kubernetes.io/component: step
    moiraweave.io/pipeline: {{ $pipelineName }}
    moiraweave.io/step: {{ $stepId }}
spec:
  replicas: {{ default 1 $step.replicas }}
  selector:
    matchLabels:
      {{- include "moiraweave.step.selectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "moiraweave.step.selectorLabels" $ctx | nindent 8 }}
    spec:
      serviceAccountName: {{ include "moiraweave.serviceAccountName" $ }}
      containers:
        - name: {{ $stepId }}
          image: {{ $step.image | quote }}
          imagePullPolicy: {{ default "IfNotPresent" $step.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ default 8080 $step.port }}
              protocol: TCP
          env:
            # --- pipeline-level env (shared across all steps) ---
            {{- range $k, $v := $pipeline.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            # --- step-level env (overrides pipeline env) ---
            {{- range $k, $v := $step.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            # --- runtime service URLs ---
            - name: REDIS_URL
              value: {{ include "moiraweave.redisUrl" $ | quote }}
            - name: QDRANT_URL
              value: {{ include "moiraweave.qdrantUrl" $ | quote }}
          livenessProbe:
            httpGet:
              path: /v2/health/ready
              port: {{ default 8080 $step.port }}
            initialDelaySeconds: {{ default 15 $step.livenessInitialDelaySeconds }}
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: {{ default 8080 $step.port }}
            initialDelaySeconds: {{ default 5 $step.readinessInitialDelaySeconds }}
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- if $step.resources }}
            {{- toYaml $step.resources | nindent 12 }}
            {{- else }}
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
            {{- end }}
          {{- if $step.modelVolume }}
          volumeMounts:
            - name: models-cache
              mountPath: {{ $step.modelVolume }}
          {{- end }}
      {{- if $step.modelVolume }}
      volumes:
        - name: models-cache
          persistentVolumeClaim:
            claimName: {{ printf "%s-models-cache" (include "moiraweave.fullname" $) }}
      {{- end }}
      {{- if $step.nodeSelector }}
      nodeSelector:
        {{- toYaml $step.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if $step.tolerations }}
      tolerations:
        {{- toYaml $step.tolerations | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
