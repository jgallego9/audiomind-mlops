apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inferflow.apiGateway.fullname" . }}
  labels:
    {{- include "inferflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
spec:
  replicas: {{ .Values.apiGateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "inferflow.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api-gateway
  template:
    metadata:
      labels:
        {{- include "inferflow.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api-gateway
    spec:
      serviceAccountName: {{ include "inferflow.serviceAccountName" . }}
      containers:
        - name: api-gateway
          image: "{{ .Values.apiGateway.image.repository }}:{{ .Values.apiGateway.image.tag }}"
          imagePullPolicy: {{ .Values.apiGateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            # --- sourced from values (list, stable order) ---
            {{- toYaml .Values.apiGateway.env | nindent 12 }}
            # --- internal service URLs derived from release name ---
            - name: REDIS_URL
              value: {{ include "inferflow.redisUrl" . | quote }}
            - name: QDRANT_URL
              value: {{ include "inferflow.qdrantUrl" . | quote }}
            # --- secret values ---
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiGateway.existingSecret }}
                  key: {{ .Values.apiGateway.secretKey }}
          livenessProbe:
            {{- toYaml .Values.apiGateway.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.apiGateway.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}
