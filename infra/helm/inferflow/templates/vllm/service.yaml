{{- if .Values.vllm.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "inferflow.fullname" . }}-vllm
  labels:
    {{- include "inferflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
spec:
  type: {{ .Values.vllm.service.type }}
  ports:
    - port: {{ .Values.vllm.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "inferflow.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
{{- end }}
