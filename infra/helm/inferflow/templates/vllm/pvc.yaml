{{- if and .Values.vllm.enabled .Values.vllm.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "inferflow.fullname" . }}-vllm-cache
  labels:
    {{- include "inferflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.vllm.persistence.storageClass }}
  storageClassName: {{ .Values.vllm.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.vllm.persistence.size }}
{{- end }}
