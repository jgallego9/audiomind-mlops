{{- /*
ClusterIP Service per pipeline step.
*/ -}}
{{- range $pipelineName, $pipeline := .Values.pipelines }}
{{- if $pipeline.enabled }}
{{- range $stepId, $step := $pipeline.steps }}
{{- if $step.image }}
{{- $ctx := dict "root" $ "pipelineName" $pipelineName "stepId" $stepId }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "inferflow.step.fullname" $ctx }}
  labels:
    {{- include "inferflow.labels" $ | nindent 4 }}
    app.kubernetes.io/component: step
    inferflow.io/pipeline: {{ $pipelineName }}
    inferflow.io/step: {{ $stepId }}
spec:
  type: ClusterIP
  selector:
    {{- include "inferflow.step.selectorLabels" $ctx | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: {{ default 8080 $step.port }}
      protocol: TCP
{{- end }}
{{- end }}
{{- end }}
{{- end }}
