# KEDA ScaledObject — worker
#
# Scales the worker Deployment based on the depth of the Redis Stream
# used for inference jobs. This ensures workers always keep up with the queue.
#
# Ref: https://keda.sh/docs/latest/scalers/redis-streams/
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-scaledobject
  namespace: inferflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inferflow-worker

  minReplicaCount: 1
  maxReplicaCount: 5
  cooldownPeriod: 120
  pollingInterval: 10

  triggers:
    # ── Trigger: Redis Stream pending messages ────────────────────────────────
    # Scale out when the consumer group has > 5 unacknowledged messages per replica.
    - type: redis-streams
      metadata:
        # address is derived from the inferflow.redisUrl helper
        address: inferflow-redis-master.inferflow.svc.cluster.local:6379
        stream: inference_jobs
        consumerGroup: workers
        # pendingEntriesCount: target pending entries per replica
        pendingEntriesCount: "5"
        # activationLagCount: minimum lag before scaling from 0
        activationLagCount: "1"
