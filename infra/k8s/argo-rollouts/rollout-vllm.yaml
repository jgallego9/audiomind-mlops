# rollout-vllm.yaml — Argo Rollouts canary deployment for the vLLM inference service.
#
# Drop-in replacement for the apps/v1 Deployment produced by
# infra/helm/inferflow/templates/vllm/deployment.yaml.  Apply AFTER the
# Helm-managed Deployment has been deleted (or set vllm.enabled=false in the
# Helm chart and let ArgoCD sync before applying this manifest).
#
# Validated against Argo Rollouts docs:
#   https://argoproj.github.io/argo-rollouts/features/canary/
#   https://argoproj.github.io/argo-rollouts/features/analysis/
#
# CRD: apiVersion argoproj.io/v1alpha1, kind Rollout
# Canary strategy without a traffic router → replica-ratio approximation.
# Background AnalysisRun starts at step index 2 (after the first setWeight+pause).
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: inferflow-vllm
  namespace: inferflow
  labels:
    app.kubernetes.io/name: inferflow
    app.kubernetes.io/component: vllm
    app.kubernetes.io/managed-by: argo-rollouts
spec:
  replicas: 1
  # Must match the Service selector used by the vLLM ClusterIP service.
  selector:
    matchLabels:
      app.kubernetes.io/name: inferflow
      app.kubernetes.io/component: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inferflow
        app.kubernetes.io/component: vllm
    spec:
      serviceAccountName: inferflow
      containers:
        - name: vllm
          # Image tag is overridden by scripts/promote-model.sh via
          # `kubectl argo rollouts set image`.
          image: "vllm/vllm-openai:latest"
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - vllm.entrypoints.openai.api_server
            - --model
            - /data/huggingface
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: inferflow-hf-token
                  key: token
                  optional: true
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "4"
              memory: 16Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: model-cache
              mountPath: /data/huggingface
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: inferflow-vllm-model-cache
  minReadySeconds: 30
  revisionHistoryLimit: 3

  strategy:
    canary:
      # No traffic router → replica-ratio weighting.
      maxSurge: 1
      maxUnavailable: 0

      # ── Canary steps ────────────────────────────────────────────────────────
      # Step 0: route ~10 % of replicas to canary
      # Step 1: observe for 5 min
      # Step 2: increase to ~50 %  ← background analysis starts here
      # Step 3: observe for 10 min
      # Step 4: full promotion
      steps:
        - setWeight: 10
        - pause:
            duration: 5m
        - setWeight: 50
        - pause:
            duration: 10m
        - setWeight: 100

      # ── Background analysis ──────────────────────────────────────────────────
      # startingStep: 2 → analysis run is created when step index 2 is reached
      # (i.e., after the first setWeight+pause pair completes).
      # Docs: https://argoproj.github.io/argo-rollouts/features/analysis/#background-analysis
      analysis:
        templates:
          - templateName: vllm-success-rate
        startingStep: 2
        args:
          - name: prometheus-url
            value: http://prometheus-operated.monitoring.svc.cluster.local:9090
