# ApplicationSet: moiraweave-auto-sync
# Manages environments that use automated sync (dev).
# Separate from moiraweave-manual-sync to allow independent pause/resume.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: moiraweave-auto-sync
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - env: dev
            namespace: moiraweave-dev
            targetRevision: main
  template:
    metadata:
      name: "moiraweave-{{ .env }}"
      namespace: argocd
      labels:
        app.kubernetes.io/name: moiraweave
        env: "{{ .env }}"
    spec:
      project: moiraweave
      source:
        repoURL: https://github.com/jgallego9/moiraweave-mlops.git
        targetRevision: "{{ .targetRevision }}"
        path: infra/helm/moiraweave
        helm:
          valueFiles:
            - values.yaml
            - "values-{{ .env }}.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
---
# ApplicationSet: moiraweave-manual-sync
# Manages environments that require human approval before sync (staging, prod).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: moiraweave-manual-sync
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - env: staging
            namespace: moiraweave-staging
            targetRevision: main
          - env: prod
            namespace: moiraweave-prod
            targetRevision: release/stable
  template:
    metadata:
      name: "moiraweave-{{ .env }}"
      namespace: argocd
      labels:
        app.kubernetes.io/name: moiraweave
        env: "{{ .env }}"
    spec:
      project: moiraweave
      source:
        repoURL: https://github.com/jgallego9/moiraweave-mlops.git
        targetRevision: "{{ .targetRevision }}"
        path: infra/helm/moiraweave
        helm:
          valueFiles:
            - values.yaml
            - "values-{{ .env }}.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        # No automated block — sync requires explicit human/CI approval.
