# PodMonitor — scrapes the Inferflow worker Prometheus metrics server.
# The worker exposes metrics via prometheus_client.start_http_server() on
# port 9090 (named "metrics" in the Deployment container ports).
# A Service is not required for PodMonitor discovery.
#
# Validated against: https://prometheus-operator.dev/docs/api-reference/api/
# apiVersion: monitoring.coreos.com/v1  kind: PodMonitor
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: inferflow-worker
  namespace: monitoring
  labels:
    app.kubernetes.io/name: inferflow
    app.kubernetes.io/component: worker
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: inferflow
      app.kubernetes.io/component: worker
  namespaceSelector:
    matchNames:
      - inferflow
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      honorLabels: false
