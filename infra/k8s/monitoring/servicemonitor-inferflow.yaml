# ServiceMonitor — scrapes the Inferflow api-gateway /metrics endpoint.
# The api-gateway exposes Prometheus metrics via prometheus_fastapi_instrumentator
# at /metrics on the same HTTP port (8000), named "http" in the Service.
#
# Validated against: https://prometheus-operator.dev/docs/api-reference/api/
# apiVersion: monitoring.coreos.com/v1  kind: ServiceMonitor
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: inferflow-api-gateway
  namespace: monitoring
  labels:
    app.kubernetes.io/name: inferflow
    app.kubernetes.io/component: api-gateway
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: inferflow
      app.kubernetes.io/component: api-gateway
  namespaceSelector:
    matchNames:
      - inferflow
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      honorLabels: false
