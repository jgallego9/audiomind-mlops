# ResourceQuota for the moiraweave namespace.
#
# Caps total CPU and memory across all pods in the namespace.
# Tune these values based on available cluster capacity.
#
# Apply:
#   kubectl apply -f infra/k8s/namespaces/moiraweave/
#
# Ref: https://kubernetes.io/docs/concepts/policy/resource-quotas/
apiVersion: v1
kind: ResourceQuota
metadata:
  name: moiraweave-quota
  namespace: moiraweave
spec:
  hard:
    # Compute (totals for all running pods in the namespace)
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi

    # GPU slots (requires GPU Operator, F2-3)
    requests.nvidia.com/gpu: "2"
    limits.nvidia.com/gpu: "2"

    # Object counts — prevent runaway controllers from flooding the API server
    pods: "50"
    services: "20"
    persistentvolumeclaims: "10"
    secrets: "20"
    configmaps: "20"
