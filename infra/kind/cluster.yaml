# AudioMind local Kubernetes cluster.
#
# Multi-node kind setup for Phase 2:
# - 1 control-plane node
# - 2 worker nodes
# - host ports reserved for the future local Ingress layer (F2-8)
# The cluster name is set by Makefile via KIND_CLUSTER_NAME=audiomind.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
  - role: worker
  - role: worker
