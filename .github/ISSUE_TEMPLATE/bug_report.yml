name: Bug report
description: Report a runtime, pipeline, or infrastructure bug.
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Call ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and traces
      description: Include stack traces, pod logs, or request/response snippets.
      render: shell

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Ubuntu 24.04 / macOS 15 / Windows 11
    validations:
      required: true

  - type: input
    id: k8s
    attributes:
      label: Kubernetes version
      placeholder: v1.31.x (or N/A if local compose)

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: 3.13.x
    validations:
      required: true
