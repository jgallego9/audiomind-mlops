# run `make pre-commit-install` once after cloning
# run `pre-commit autoupdate` to update hook revisions

repos:
  # ---------------------------------------------------------------------------
  # Ruff — linter (with auto-fix) + formatter
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ---------------------------------------------------------------------------
  # Mypy — static type checker
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic[mypy]>=2.0
          - types-redis
        args: [--config-file=pyproject.toml]
        pass_filenames: false  # mypy needs full project context

  # ---------------------------------------------------------------------------
  # General hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]  # allow custom YAML tags (Helm, k8s)
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
